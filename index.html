<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Rotas de Ônibus - Barra do Garças</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="assets/css/leaflet.css">
    <link rel="stylesheet" href="assets/css/leaflet-routing-machine.css">
    <link rel="stylesheet" href="assets/css/estilo.css">
    <!-- Leaflet CSS -->
</head>

<body>
    <button id="btn-menu" class="btn-menu" type="button" aria-label="Abrir menu" aria-expanded="false"
        aria-controls="menu-lateral">
        ⋮
    </button>

    <nav id="menu-lateral" class="menu-lateral" aria-hidden="true">
        <div class="menu-cabecalho">
            <h2>Rotas BG</h2>
            <button id="btn-fechar" class="btn-fechar" type="button" aria-label="Fechar menu">✖</button>
        </div>
        <ul class="menu-links">
            <li><a href="#">🗺️ Mapa Principal</a></li>
            <li><a href="menu-lateral/info-geral.html">❓ Informações</a></li>
            <li><a href="menu-lateral/info-projeto.html">🎓 Sobre o Projeto</a></li>
        </ul>
    </nav>
    <div class="container">
        <header>
            <h1>Rotas de Ônibus - Barra do Garças!!!!</h1>
            <p class="subtitle">Visualize as rotas do transporte coletivo da cidade</p>
        </header>

        <div class="route-selector">
            <select id="routeSelector">
                <option value="">Selecione uma rota</option>
                <option value="rota1">Rota 1: Terminal → Águas Quentes</option>
            </select>
            <button onclick="carregarRota()">Carregar Rota</button>
            <button onclick="alternarPontosInteresse()" class="btn-paradas" title="Mostrar/Esconder Pontos">🚏 Pontos</button>
        </div>

        <div class="content">
            <div class="map-container">
                <div id="map"></div>
            </div>

            <div class="info-panel">
                <div class="route-info">
                    <h3>Informações da Rota</h3>
                    <p id="routeDetails">Selecione uma rota para ver detalhes</p>
                </div>
            </div>
        </div>

        <div class="attribution">
            <p>Mapa desenvolvido com Leaflet | Dados do OpenStreetMap</p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/main.js"></script>
    <!-- SCRIPTS -->
</body>

</html>
